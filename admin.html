<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RUSH XP — Panel Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #0a0a0c;
  --panel:  #131316;
  --p2:     #18181c;
  --line:   #26262c;
  --red:    #ef2434;
  --green:  #28d17c;
  --gold:   #ffd860;
  --muted:  #8a8a93;
  --muted2: #5e5e66;
}
body {
  background: var(--bg); color: #fff;
  font-family: 'Inter', sans-serif; font-size: 14px;
  min-height: 100vh; display: flex;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--panel); border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  padding: 20px 16px; gap: 8px;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 4px 6px 20px; border-bottom: 1px solid var(--line); margin-bottom: 8px;
}
.sidebar-logo-text {
  font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: .06em;
}
.sidebar-logo-badge {
  font-size: 9px; background: var(--red); color: #fff;
  padding: 2px 6px; border-radius: 4px; font-weight: 700;
  letter-spacing: .08em; font-family: 'Oswald', sans-serif; margin-left: 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 7px; cursor: pointer;
  color: var(--muted); font-weight: 500; font-size: 13px;
  background: transparent; border: none; text-align: left; width: 100%;
  transition: background .15s, color .15s; position: relative;
}
.nav-item:hover { background: rgba(255,255,255,.03); color: #fff; }
.nav-item.active { background: rgba(239,36,52,.08); color: var(--red); font-weight: 600; }
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
  width: 2px; background: var(--red); border-radius: 2px;
}
.sidebar-section-label {
  font-size: 10px; font-family: 'Oswald', sans-serif; font-weight: 600;
  letter-spacing: .12em; color: var(--muted2); padding: 8px 12px 4px; text-transform: uppercase;
}
.sidebar-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--line); }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* ── TOP BAR ── */
.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 28px; border-bottom: 1px solid var(--line);
  background: var(--panel); position: sticky; top: 0; z-index: 10;
}
.topbar-title { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: .04em; flex: 1; }
.topbar-actions { display: flex; gap: 10px; }

/* ── CONTENT ── */
.content { padding: 28px; flex: 1; }

/* ── STAT CARDS ── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card {
  background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
  padding: 20px; position: relative; overflow: hidden;
}
.stat-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.stat-card.red::after   { background: linear-gradient(90deg, var(--red), transparent); }
.stat-card.green::after { background: linear-gradient(90deg, var(--green), transparent); }
.stat-card.gold::after  { background: linear-gradient(90deg, var(--gold), transparent); }
.stat-card.blue::after  { background: linear-gradient(90deg, #60a5fa, transparent); }
.stat-label { font-size: 11px; font-family: 'Oswald', sans-serif; font-weight: 600; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.stat-value { font-family: 'Oswald', sans-serif; font-size: 36px; font-weight: 700; line-height: 1; }
.stat-sub   { font-size: 11px; color: var(--muted); margin-top: 6px; }
.stat-icon  { position: absolute; right: 16px; top: 16px; opacity: .15; }

/* ── FILTERS ── */
.filters-bar {
  display: flex; gap: 10px; align-items: center;
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 180px; }
.search-ico  { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
.search-input {
  width: 100%; padding: 9px 12px 9px 36px;
  background: var(--p2); border: 1px solid var(--line); border-radius: 7px;
  color: #fff; font-family: 'Inter', sans-serif; font-size: 13px; outline: none;
}
.search-input:focus { border-color: var(--red); }
.filter-select {
  padding: 9px 12px; background: var(--p2); border: 1px solid var(--line);
  border-radius: 7px; color: #fff; font-family: 'Inter', sans-serif;
  font-size: 13px; outline: none; cursor: pointer; min-width: 140px;
}
.filter-select:focus { border-color: var(--red); }
.btn { padding: 9px 16px; border-radius: 7px; font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: .06em; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 7px; }
.btn-red   { background: var(--red); color: #fff; }
.btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--muted); }
.btn-ghost:hover { border-color: #4a4a52; color: #fff; }
.btn-green { background: rgba(40,209,124,.12); border: 1px solid rgba(40,209,124,.3); color: var(--green); }
.btn-danger { background: rgba(239,36,52,.1); border: 1px solid rgba(239,36,52,.3); color: var(--red); }
.btn-sm { padding: 5px 10px; font-size: 11px; }

/* ── TABLE ── */
.table-wrap {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 12px; overflow: hidden;
}
.table-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--line);
}
.table-title { font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: .06em; }
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left; padding: 10px 16px;
  font-size: 10px; font-family: 'Oswald', sans-serif; font-weight: 600;
  letter-spacing: .1em; color: var(--muted); text-transform: uppercase;
  border-bottom: 1px solid var(--line); background: var(--p2);
}
tbody tr { border-bottom: 1px solid var(--line); transition: background .15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,.02); }
td { padding: 14px 16px; font-size: 13px; vertical-align: middle; }

/* ── BADGES ── */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 20px; font-size: 11px;
  font-family: 'Oswald', sans-serif; font-weight: 600; letter-spacing: .06em;
}
.badge-green  { background: rgba(40,209,124,.12);  color: var(--green);  border: 1px solid rgba(40,209,124,.25); }
.badge-red    { background: rgba(239,36,52,.1);    color: var(--red);    border: 1px solid rgba(239,36,52,.25); }
.badge-yellow { background: rgba(255,216,96,.1);   color: var(--gold);   border: 1px solid rgba(255,216,96,.25); }
.badge-gray   { background: rgba(138,138,147,.08); color: var(--muted);  border: 1px solid var(--line); }

/* ── ACTIONS CELL ── */
.actions-cell { display: flex; gap: 6px; align-items: center; }

/* ── PAGINATION ── */
.pagination {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-top: 1px solid var(--line);
  font-size: 12px; color: var(--muted);
}
.page-btns { display: flex; gap: 4px; }
.page-btn {
  width: 28px; height: 28px; border-radius: 5px; border: 1px solid var(--line);
  background: transparent; color: var(--muted); cursor: pointer;
  display: grid; place-items: center; font-size: 12px;
}
.page-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

/* ── MODAL ── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.75);
  display: none; place-items: center; z-index: 100; padding: 20px;
}
.modal-bg.open { display: grid; }
.modal {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 14px; width: 100%; max-width: 600px;
  max-height: 90vh; overflow-y: auto; position: relative;
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px; border-bottom: 1px solid var(--line); position: sticky; top: 0;
  background: var(--panel);
}
.modal-head h3 { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; }
.modal-body { padding: 24px; }
.modal-section { margin-bottom: 22px; }
.modal-section h4 {
  font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 600;
  letter-spacing: .1em; color: var(--muted); text-transform: uppercase;
  margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line);
}
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.info-item .ik { font-size: 11px; color: var(--muted2); margin-bottom: 3px; }
.info-item .iv { font-size: 14px; font-weight: 600; }
.joueur-row-modal {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #1a1a20;
}
.joueur-row-modal:last-child { border-bottom: none; }
.jm-num {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: var(--p2); color: var(--muted); font-size: 12px;
  font-family: 'Oswald', sans-serif; font-weight: 700;
  display: grid; place-items: center;
}
.jm-num.cap { background: rgba(239,36,52,.12); color: var(--red); }
.modal-actions {
  display: flex; gap: 10px; padding: 18px 24px;
  border-top: 1px solid var(--line); flex-wrap: wrap;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
  padding: 14px 18px; font-size: 13px; display: flex; align-items: center; gap: 10px;
  transform: translateY(80px); opacity: 0; transition: all .3s ease;
  min-width: 260px; max-width: 360px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: rgba(40,209,124,.4); }
.toast.error   { border-color: rgba(239,36,52,.4); }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--muted);
}
.empty-state svg { opacity: .3; margin-bottom: 16px; }
.empty-state p { font-size: 13px; }

/* ── SPINNER ── */
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--line);
  border-top-color: var(--red); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── CONFIRM DIALOG ── */
.confirm-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.8);
  display: none; place-items: center; z-index: 200;
}
.confirm-bg.open { display: grid; }
.confirm-box {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 12px; padding: 28px; max-width: 380px; width: 100%; text-align: center;
}
.confirm-box h3 { font-family: 'Oswald', sans-serif; font-size: 18px; margin-bottom: 10px; }
.confirm-box p  { font-size: 13px; color: var(--muted); margin-bottom: 22px; }
.confirm-btns   { display: flex; gap: 10px; justify-content: center; }
</style>
</head>

<script>
const TOKEN = localStorage.getItem('rushfive_admin_token');
if (!TOKEN) window.location.href = 'admin-login.html';

const api = (path, opts = {}) => fetch('/api/admin' + path, {
  ...opts,
  headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN, ...(opts.headers || {}) }
}).then(async r => {
  if (r.status === 401) { localStorage.removeItem('rushfive_admin_token'); window.location.href = 'admin-login.html'; }
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Erreur serveur');
  return data;
});

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.innerHTML = `
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${type==='success'?'#28d17c':'#ef2434'}" stroke-width="2.5">
      ${type==='success' ? '<polyline points="4 12 10 18 20 6"/>' : '<path d="M18 6 6 18M6 6l12 12"/>'}
    </svg>
    ${msg}`;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.className = 'toast', 3500);
}

// ── CONFIRM DIALOG ────────────────────────────────────────────────────────────
function confirm(title, msg, onOk) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent   = msg;
  document.getElementById('confirm-bg').classList.add('open');
  document.getElementById('confirm-ok').onclick = () => {
    document.getElementById('confirm-bg').classList.remove('open');
    onOk();
  };
}
document.getElementById('confirm-cancel').addEventListener('click', () => {
  document.getElementById('confirm-bg').classList.remove('open');
});

// ── STATS ─────────────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const s = await api('/stats');
    document.getElementById('stat-total').textContent   = s.total;
    document.getElementById('stat-paid').textContent    = s.paid;
    document.getElementById('stat-pending').textContent = s.pending;
    document.getElementById('stat-revenue').textContent = (s.revenue / 100).toFixed(0) + '€';
    document.getElementById('nav-badge-insc').textContent = s.total;
  } catch(e) { console.error(e); }
}

// ── TABLE ─────────────────────────────────────────────────────────────────────
let allRows = [];
let currentPage = 1;
const PER_PAGE  = 15;

async function loadInscriptions() {
  const search  = document.getElementById('search-input').value;
  const statut  = document.getElementById('filter-statut').value;
  const paiement = document.getElementById('filter-paiement').value;

  const params = new URLSearchParams();
  if (search)   params.set('search', search);
  if (statut)   params.set('statut', statut);
  if (paiement) params.set('paiement', paiement);

  document.getElementById('table-body').innerHTML = '<div class="spinner"></div>';

  try {
    allRows = await api('/inscriptions?' + params);
    renderTable();
  } catch(e) {
    document.getElementById('table-body').innerHTML = `<div class="empty-state"><p>${e.message}</p></div>`;
  }
}

function renderTable() {
  const total  = allRows.length;
  const pages  = Math.ceil(total / PER_PAGE);
  currentPage  = Math.min(currentPage, pages || 1);
  const start  = (currentPage - 1) * PER_PAGE;
  const rows   = allRows.slice(start, start + PER_PAGE);

  document.getElementById('table-count').textContent = total + ' résultat(s)';

  if (!rows.length) {
    document.getElementById('table-body').innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="9" cy="9" r="3"/><path d="M3 19c0-3 2.5-5 6-5s6 2 6 5"/></svg>
        <p>Aucune inscription trouvée</p>
      </div>`;
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  const tbody = rows.map(r => {
    const pBadge = r.paiement_statut === 'paid'     ? '<span class="badge badge-green">✓ Payé</span>'
                 : r.paiement_statut === 'pending'  ? '<span class="badge badge-yellow">⏳ En attente</span>'
                 : r.paiement_statut === 'refunded' ? '<span class="badge badge-gray">↩ Remboursé</span>'
                 : '<span class="badge badge-red">✗ Échoué</span>';
    const sBadge = r.statut === 'validee'    ? '<span class="badge badge-green">Validée</span>'
                 : r.statut === 'refusee'    ? '<span class="badge badge-red">Refusée</span>'
                 : '<span class="badge badge-yellow">En attente</span>';
    const date = new Date(r.created_at).toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
    const amt  = r.stripe_amount ? (r.stripe_amount/100).toFixed(0)+'€' : '—';

    return `<tr>
      <td><span style="font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted);">#${r.id}</span></td>
      <td>
        <div style="font-weight:600;">${r.nom}</div>
        <div style="font-size:11px; color:var(--muted);">${r.tag ? '['+r.tag+'] ' : ''}${r.capitaine || ''}</div>
      </td>
      <td style="text-align:center;"><span style="font-family:'Oswald',sans-serif; font-weight:700; font-size:16px;">${r.nb_joueurs}</span><span style="font-size:11px; color:var(--muted);">/5</span></td>
      <td>${pBadge}</td>
      <td>${sBadge}</td>
      <td style="font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--green);">${amt}</td>
      <td style="font-size:11px; color:var(--muted);">${date}</td>
      <td>
        <div class="actions-cell">
          <button class="btn btn-ghost btn-sm" onclick="openModal(${r.id})">Voir</button>
          ${r.paiement_statut === 'paid' && r.statut !== 'refusee'
            ? `<button class="btn btn-danger btn-sm" onclick="rembourser(${r.id}, '${r.nom.replace(/'/g,"\\'")}')">Rembourser</button>`
            : ''}
          <button class="btn btn-danger btn-sm" onclick="supprimer(${r.id}, '${r.nom.replace(/'/g,"\\'")}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('table-body').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th><th>Équipe</th><th style="text-align:center;">Joueurs</th>
          <th>Paiement</th><th>Statut</th><th>Montant</th><th>Date</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>${tbody}</tbody>
    </table>`;

  // Pagination
  const pag = document.getElementById('pagination');
  pag.style.display = 'flex';
  document.getElementById('pag-info').textContent = `${start+1}–${Math.min(start+PER_PAGE, total)} sur ${total}`;
  const btns = document.getElementById('page-btns');
  btns.innerHTML = '';
  for (let p = 1; p <= pages; p++) {
    const b = document.createElement('button');
    b.className = 'page-btn' + (p === currentPage ? ' active' : '');
    b.textContent = p;
    b.onclick = () => { currentPage = p; renderTable(); };
    btns.appendChild(b);
  }
}

// ── MODAL DÉTAIL ──────────────────────────────────────────────────────────────
async function openModal(id) {
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('modal-body').innerHTML = '<div class="spinner"></div>';
  document.getElementById('modal-actions').innerHTML = '';

  try {
    const { equipe, joueurs } = await api('/inscriptions/' + id);

    document.getElementById('modal-title').textContent = equipe.nom + (equipe.tag ? ' ['+equipe.tag+']' : '');

    const pBadge = equipe.paiement_statut === 'paid'     ? '<span class="badge badge-green">✓ Payé</span>'
                 : equipe.paiement_statut === 'pending'  ? '<span class="badge badge-yellow">⏳ En attente</span>'
                 : equipe.paiement_statut === 'refunded' ? '<span class="badge badge-gray">↩ Remboursé</span>'
                 : '<span class="badge badge-red">✗ Échoué</span>';

    document.getElementById('modal-body').innerHTML = `
      <div class="modal-section">
        <h4>Informations équipe</h4>
        <div class="info-grid">
          <div class="info-item"><div class="ik">Nom</div><div class="iv">${equipe.nom}</div></div>
          <div class="info-item"><div class="ik">Tag</div><div class="iv">${equipe.tag || '—'}</div></div>
          <div class="info-item"><div class="ik">Mode</div><div class="iv">${equipe.mode_jeu}</div></div>
          <div class="info-item"><div class="ik">Statut</div><div class="iv">${equipe.statut}</div></div>
          <div class="info-item"><div class="ik">Paiement</div><div class="iv">${pBadge}</div></div>
          <div class="info-item"><div class="ik">Montant</div><div class="iv" style="color:var(--green);">${equipe.stripe_amount ? (equipe.stripe_amount/100).toFixed(0)+'€' : '—'}</div></div>
          <div class="info-item" style="grid-column:1/-1;"><div class="ik">ID Stripe</div><div class="iv" style="font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted);">${equipe.stripe_payment_intent_id || '—'}</div></div>
          <div class="info-item"><div class="ik">Inscription</div><div class="iv">${new Date(equipe.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div></div>
        </div>
      </div>
      <div class="modal-section">
        <h4>Joueurs (${joueurs.length})</h4>
        ${joueurs.map((j,i) => `
          <div class="joueur-row-modal">
            <div class="jm-num${j.est_capitaine?' cap':''}">${i+1}</div>
            <div style="flex:1;">
              <div style="font-weight:600; font-size:13px;">${j.prenom} ${j.nom} <span style="color:var(--muted); font-weight:400;">· ${j.pseudo}</span></div>
              <div style="font-size:11px; color:var(--muted); margin-top:2px;">${j.email}${j.telephone?' · '+j.telephone:''}</div>
            </div>
            ${j.est_capitaine ? '<span class="badge badge-red" style="font-size:10px;">CAP.</span>' : ''}
          </div>
        `).join('')}
      </div>`;

    // Actions dans la modal
    const actions = document.getElementById('modal-actions');
    actions.innerHTML = '';

    if (equipe.statut === 'en_attente') {
      const btnV = document.createElement('button');
      btnV.className = 'btn btn-green';
      btnV.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="4 12 10 18 20 6"/></svg> Valider';
      btnV.onclick = () => updateStatut(id, 'validee', 'paid');
      actions.appendChild(btnV);

      const btnR = document.createElement('button');
      btnR.className = 'btn btn-danger';
      btnR.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg> Refuser';
      btnR.onclick = () => updateStatut(id, 'refusee', null);
      actions.appendChild(btnR);
    }

    if (equipe.paiement_statut === 'paid' && equipe.statut !== 'refusee') {
      const btnRmb = document.createElement('button');
      btnRmb.className = 'btn btn-ghost';
      btnRmb.innerHTML = '↩ Rembourser';
      btnRmb.onclick = () => rembourser(id, equipe.nom);
      actions.appendChild(btnRmb);
    }

    const btnClose = document.createElement('button');
    btnClose.className = 'btn btn-ghost';
    btnClose.style.marginLeft = 'auto';
    btnClose.textContent = 'Fermer';
    btnClose.onclick = closeModal;
    actions.appendChild(btnClose);

  } catch(e) {
    document.getElementById('modal-body').innerHTML = `<div class="empty-state"><p>${e.message}</p></div>`;
  }
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function updateStatut(id, statut, paiement_statut) {
  closeModal();
  try {
    const body = { statut };
    if (paiement_statut) body.paiement_statut = paiement_statut;
    await api('/inscriptions/' + id, { method: 'PUT', body: JSON.stringify(body) });
    toast('Statut mis à jour ✓', 'success');
    loadInscriptions(); loadStats();
  } catch(e) { toast(e.message, 'error'); }
}

function rembourser(id, nom) {
  confirm('Rembourser ' + nom, 'Un remboursement Stripe sera initié. Cette action est irréversible.', async () => {
    try {
      await api('/inscriptions/' + id + '/rembourser', { method: 'POST' });
      toast('Remboursement effectué ✓', 'success');
      loadInscriptions(); loadStats();
    } catch(e) { toast(e.message, 'error'); }
  });
}

function supprimer(id, nom) {
  confirm('Supprimer ' + nom, 'Cette équipe sera définitivement supprimée de la base de données.', async () => {
    try {
      await api('/inscriptions/' + id, { method: 'DELETE' });
      toast('Équipe supprimée', 'success');
      loadInscriptions(); loadStats();
    } catch(e) { toast(e.message, 'error'); }
  });
}

// ── FILTRES ───────────────────────────────────────────────────────────────────
let searchTimer;
document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentPage = 1; loadInscriptions(); }, 350);
});
['filter-statut','filter-paiement'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => { currentPage = 1; loadInscriptions(); });
});
document.getElementById('btn-clear-filters').addEventListener('click', () => {
  document.getElementById('search-input').value   = '';
  document.getElementById('filter-statut').value  = '';
  document.getElementById('filter-paiement').value = '';
  currentPage = 1; loadInscriptions();
});

// ── EXPORT CSV ────────────────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  window.location.href = '/api/admin/export';
});

// ── REFRESH ───────────────────────────────────────────────────────────────────
document.getElementById('btn-refresh').addEventListener('click', () => {
  loadStats(); loadInscriptions();
  toast('Données actualisées', 'success');
});

// ── LOGOUT ────────────────────────────────────────────────────────────────────
document.getElementById('btn-logout').addEventListener('click', () => {
  localStorage.removeItem('rushfive_admin_token');
  window.location.href = 'admin-login.html';
});

// ── HORLOGE ───────────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('topbar-time').textContent =
    new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
updateClock();
setInterval(updateClock, 1000);

// ── INIT ──────────────────────────────────────────────────────────────────────
loadStats();
loadInscriptions();
// Auto-refresh toutes les 30s
setInterval(() => { loadStats(); loadInscriptions(); }, 30000);
</script>
</body>
</html>
