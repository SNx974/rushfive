<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Rush Stack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --panel: #131316;
    --panel-2: #18181c;
    --panel-3: #1d1d22;
    --line: #26262c;
    --line-2: #2d2d34;
    --text: #ffffff;
    --muted: #8a8a93;
    --muted-2: #5e5e66;
    --red: #ef2434;
    --red-2: #ff3a48;
    --red-dim: #8a1722;
    --green: #28d17c;
    --purple: #7c3aed;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }
  body { min-height: 100vh; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  .display { font-family: 'Rajdhani', 'Inter', sans-serif; letter-spacing: 0.01em; }
  .mono-up { font-family: 'Rajdhani', sans-serif; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; }
  #root { min-height: 100vh; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #2a2a31; border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="profile.jsx"></script>
<script type="text/babel" src="leaderboard.jsx"></script>
<script type="text/babel" src="match-flow.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
