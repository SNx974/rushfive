<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RUSH XP — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0a0a0c;
    --panel:   #131316;
    --panel2:  #18181c;
    --line:    #26262c;
    --red:     #ef2434;
    --muted:   #8a8a93;
  }
  body {
    background: var(--bg); color: #fff;
    font-family: 'Inter', sans-serif;
    min-height: 100vh; display: grid; place-items: center;
    position: relative; overflow: hidden;
  }
  /* Grid background */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(239,36,52,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(239,36,52,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .login-card {
    width: 100%; max-width: 420px; padding: 20px;
    position: relative; z-index: 1;
  }
  .login-logo {
    display: flex; align-items: center; gap: 12px;
    justify-content: center; margin-bottom: 40px;
  }
  .logo-icon {
    width: 48px; height: 48px;
  }
  .login-title {
    font-family: 'Oswald', sans-serif;
    font-size: 28px; font-weight: 700; letter-spacing: .08em;
  }
  .login-box {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px; padding: 36px 32px;
    position: relative; overflow: hidden;
  }
  .login-box::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
  }
  .login-box h2 {
    font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700;
    letter-spacing: .06em; text-align: center; margin-bottom: 6px;
  }
  .login-box p {
    font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 28px;
  }
  .field-label {
    font-size: 11px; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted);
    font-family: 'Oswald', sans-serif; margin-bottom: 6px; display: block;
  }
  .field-wrap {
    position: relative; margin-bottom: 20px;
  }
  .field-input {
    width: 100%; padding: 12px 16px;
    background: var(--panel2); border: 1px solid var(--line);
    border-radius: 8px; color: #fff; font-family: 'Inter', sans-serif;
    font-size: 14px; outline: none; transition: border-color .2s;
  }
  .field-input:focus { border-color: var(--red); }
  .toggle-pw {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer;
    padding: 4px;
  }
  .login-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(180deg, #ef2434, #c1121f);
    border: none; border-radius: 8px; color: #fff;
    font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700;
    letter-spacing: .08em; cursor: pointer;
    box-shadow: 0 6px 24px rgba(239,36,52,.35);
    transition: opacity .2s; display: flex; align-items: center;
    justify-content: center; gap: 10px;
  }
  .login-btn:disabled { opacity: .5; cursor: not-allowed; }
  .login-error {
    background: rgba(239,36,52,.08); border: 1px solid rgba(239,36,52,.3);
    color: #ff6070; border-radius: 8px; padding: 10px 14px;
    font-size: 13px; margin-top: 14px; display: none; text-align: center;
  }
  .login-footer {
    text-align: center; margin-top: 24px;
    font-size: 12px; color: var(--muted);
  }
  .login-footer a { color: var(--red); text-decoration: none; }

  .spinner-sm {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <svg class="logo-icon" viewBox="0 0 64 64" fill="none">
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ff3a48"/>
          <stop offset="1" stop-color="#c1121f"/>
        </linearGradient>
      </defs>
      <path d="M8 4 L44 4 Q56 4 56 18 Q56 28 46 32 L58 60 L42 60 L32 36 L24 36 L24 60 L8 60 Z M24 14 L24 26 L40 26 Q44 26 44 20 Q44 14 40 14 Z" fill="url(#lg)"/>
    </svg>
    <div class="login-title">RUSH XP</div>
  </div>

  <div class="login-box">
    <h2>ACCÈS ADMIN</h2>
    <p>Tableau de bord de gestion des inscriptions</p>

    <form id="login-form" novalidate>
      <div class="field-wrap">
        <label class="field-label" for="password">Mot de passe</label>
        <input
          class="field-input" type="password" id="password"
          placeholder="••••••••••••" required autocomplete="current-password"
        />
        <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Afficher mot de passe">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <button class="login-btn" type="submit" id="login-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 1 1 8 0v4"/>
        </svg>
        SE CONNECTER
      </button>

      <div class="login-error" id="login-error">Mot de passe incorrect.</div>
    </form>
  </div>

  <div class="login-footer">
    <a href="index.html">← Retour au site</a>
  </div>
</div>

<script>
  // Si déjà connecté, rediriger
  if (localStorage.getItem('rushfive_admin_token')) {
    window.location.href = 'admin.html';
  }

  // Toggle password visibility
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn   = document.getElementById('login-btn');
    const err   = document.getElementById('login-error');
    const pw    = document.getElementById('password').value;

    err.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner-sm"></div> Connexion...';

    try {
      const res  = await fetch('/api/admin/login', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ password: pw }),
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Erreur');

      localStorage.setItem('rushfive_admin_token', data.token);
      window.location.href = 'admin.html';

    } catch (ex) {
      err.textContent   = ex.message;
      err.style.display = 'block';
      btn.disabled      = false;
      btn.innerHTML     = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 1 1 8 0v4"/>
        </svg>
        SE CONNECTER`;
    }
  });
</script>
</body>
</html>
